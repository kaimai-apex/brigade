name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build packages
        run: pnpm --filter @connectpro/common build

      - name: Lint
        run: pnpm lint || true

      - name: Build services
        run: |
          for svc in auth-service user-service connection-service post-service feed-service api-gateway; do
            pnpm --filter @connectpro/$svc build || true
          done

      - name: Build web app
        run: pnpm --filter @connectpro/web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_API_URL: http://localhost:3000
